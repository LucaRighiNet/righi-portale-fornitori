<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E2748">
<meta name="description" content="Portale Fornitori Righi Solutions — pubblicazione, assegnazione e gestione dei lavori di subappalto (cablaggio e costruzione quadri elettrici).">
<title>Portale Fornitori · Righi Solutions</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="logo.svg">
<style>
/* ===================================================================
   Portale Fornitori Righi Solutions — design system industriale.
   Nessun font/asset esterno, nessuna emoji: icone SVG inline.
   =================================================================== */
:root{
  --bg:#ECEEF4; --surface:#FFFFFF; --surface-2:#F5F6FA; --surface-3:#E8EBF3;
  --ink:#18203A; --ink-soft:#525A72; --muted:#7A8199;
  --brand:#1E2748; --brand-deep:#141B33; --brand-tint:#E8EAF2; --brand-line:#C7CCDE;
  --accent:#E07B27; --accent-deep:#C4661A; --accent-tint:#FCEBDB;
  --line:#DCDFE7; --line-soft:#E9EBF1;
  --ok:#2E7D53; --ok-tint:#E4F1EA;
  --warn:#B4791A; --warn-tint:#F7EEDA;
  --danger:#C0392B; --danger-tint:#F7E4E1;
  --info:#2A6BB0; --info-tint:#E4EEF8;
  --auto:#2B7A78; --dist:#2A6BB0; --pot:#C4661A;
  --shadow:0 1px 2px rgba(16,40,48,.06), 0 6px 20px rgba(16,40,48,.06);
  --shadow-lg:0 12px 40px rgba(8,40,44,.22);
  --r:12px; --r-sm:9px;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
  --sal:env(safe-area-inset-left); --sar:env(safe-area-inset-right);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink); background:var(--bg); font-size:15px; line-height:1.5;
  -webkit-text-size-adjust:100%; -webkit-font-smoothing:antialiased;
}
h1,h2,h3{margin:0;font-weight:650;line-height:1.15;letter-spacing:-.01em}
a{color:var(--brand)}
button{font-family:inherit;font-size:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
.mono{font-family:var(--mono)}
.muted{color:var(--muted)}
.soft{color:var(--ink-soft)}
.center{text-align:center}
.hide{display:none !important}
.svg-ic{width:18px;height:18px;flex:0 0 auto;vertical-align:-3px}
.svg-ic.sm{width:15px;height:15px;vertical-align:-2px}
.svg-ic.lg{width:22px;height:22px}

/* ---- Layout ---- */
#app{min-height:100dvh}
.topbar{
  position:sticky;top:0;z-index:40;color:#EAEDF6;
  background:linear-gradient(180deg,#28324f 0%,var(--brand-deep) 100%);
  padding:calc(var(--sat) + 10px) calc(var(--sar) + 14px) 10px calc(var(--sal) + 14px);
  display:flex;align-items:center;gap:10px;box-shadow:0 1px 0 rgba(0,0,0,.12);
}
.brand{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden}
.logomark{width:32px;height:32px;flex:0 0 auto;border-radius:8px}
.brand .bt{min-width:0;overflow:hidden}
.brand .bt b{display:block;font-size:14px;font-weight:700;line-height:1.1;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .bt > span{display:block;font-size:11px;opacity:.72;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em}
.wm{display:inline-flex;gap:.26em;white-space:nowrap;letter-spacing:0;text-transform:none;font-weight:400;font-size:15px}
.wm .r{font-weight:800;font-style:italic}
.wm .s{font-weight:300}
.wm-lg{display:inline-flex;gap:.3em;font-size:29px;letter-spacing:0;line-height:1.05}
.wm-lg .r{font-weight:800;font-style:italic}
.wm-lg .s{font-weight:300}
.tb-spacer{flex:1}
.tb-btn{border:1px solid rgba(234,246,246,.28);background:rgba(234,246,246,.08);color:#EAF6F6;border-radius:10px;min-height:40px;min-width:40px;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:13px;position:relative}
.tb-btn:hover{background:rgba(234,246,246,.16)}
.tb-btn .badge{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--brand-deep)}
.role-chip{font-size:10.5px;padding:3px 9px;border-radius:999px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.role-chip.righi{background:var(--accent-tint);color:var(--accent-deep)}
.role-chip.fornitore{background:var(--brand-tint);color:var(--brand-deep)}

nav.tabs{
  position:sticky;top:60px;z-index:35;display:flex;gap:2px;overflow-x:auto;
  background:var(--surface);border-bottom:1px solid var(--line);
  padding:6px calc(var(--sar) + 10px) 6px calc(var(--sal) + 10px);-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
nav.tabs::-webkit-scrollbar{display:none}
nav.tabs button{white-space:nowrap;border:1px solid transparent;background:transparent;color:var(--ink-soft);padding:8px 13px;border-radius:9px;font-size:13.5px;min-height:40px;display:inline-flex;align-items:center;gap:6px;transition:background .15s,color .15s}
nav.tabs button[aria-selected="true"]{background:var(--brand-tint);color:var(--brand-deep);font-weight:600}
nav.tabs button .cnt{background:var(--surface-3);color:var(--ink-soft);border-radius:999px;font-size:11px;padding:1px 7px;font-weight:700}
nav.tabs button[aria-selected="true"] .cnt{background:#fff;color:var(--brand)}
nav.tabs button .cnt.hot{background:var(--accent);color:#fff}

main{max-width:1180px;margin:0 auto;padding:16px calc(var(--sar) + 14px) calc(var(--sab) + 44px) calc(var(--sal) + 14px)}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:2px 0 14px}
.view-head h2{font-size:21px}
.view-head p{margin:2px 0 0;font-size:13px;color:var(--muted)}

/* ---- Cards / grid ---- */
.grid{display:grid;gap:12px}
.grid.k2{grid-template-columns:1fr 1fr}
.grid.k3{grid-template-columns:repeat(3,1fr)}
.grid.k4{grid-template-columns:repeat(4,1fr)}
.grid.auto{grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
.kpi{display:flex;flex-direction:column;gap:3px}
.kpi .v{font-size:30px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.kpi .l{font-size:12.5px;color:var(--muted)}
.kpi.accent .v{color:var(--accent-deep)}
.kpi.danger .v{color:var(--danger)}
.kpi.ok .v{color:var(--ok)}
.kpi .foot{font-size:11.5px;color:var(--muted);margin-top:2px}
.kpi.click{cursor:pointer;transition:box-shadow .15s}
.kpi.click:hover{box-shadow:0 4px 16px rgba(16,40,48,.12)}
/* metriche fornitore */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mkpi{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:9px 10px;display:flex;flex-direction:column;gap:1px}
.mkpi .v{font-size:20px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.mkpi .l{font-size:11px;color:var(--muted)}
.mkpi .s{font-size:10.5px;color:var(--muted)}
.mkpi.ok .v{color:var(--ok)} .mkpi.warn .v{color:var(--warn)} .mkpi.danger .v{color:var(--danger)}
.metric-rows{margin-top:10px;display:flex;flex-direction:column;gap:6px;font-size:12.5px}
.metric-rows > div{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.spark{display:flex;align-items:flex-end;gap:4px;height:38px;margin-top:12px}
.spark .sbar{flex:1;background:var(--brand-tint);border:1px solid var(--brand-line);border-radius:3px 3px 0 0;min-height:3px}
.spark-x{display:flex;gap:4px;font-size:10px;color:var(--muted);margin-top:2px}
.spark-x span{flex:1;text-align:center;text-transform:uppercase}
@media(max-width:560px){ .mgrid{grid-template-columns:1fr 1fr} }
/* semaforo salute commessa */
.hdot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle;flex:0 0 auto}
.hdot.verde{background:var(--ok)} .hdot.giallo{background:var(--warn)} .hdot.rosso{background:var(--danger)}
/* avanzamento a un tocco */
.steps{display:flex;gap:6px;flex-wrap:wrap}
.step{flex:1;min-width:72px;border:1px solid var(--line);background:var(--surface);border-radius:9px;padding:8px 6px;font-size:12px;text-align:center;color:var(--ink-soft);min-height:auto;position:relative}
.step.done{background:var(--brand-tint);border-color:var(--brand-line);color:var(--brand-deep);font-weight:600}
.step.cur{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:600}
.progress{display:flex;align-items:center;gap:6px;margin:6px 0}
.progress .seg{flex:1;height:6px;border-radius:3px;background:var(--surface-3)}
.progress .seg.on{background:var(--brand)}
/* mappa fornitori (SVG offline) */
.map-wrap{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.map-svg{display:block;width:100%;height:auto;background:linear-gradient(160deg,#eaf0f3,#e3eaee)}
.map-svg .pin{cursor:pointer}
.map-svg .pin:hover circle{stroke:var(--ink)}
.map-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);padding:10px 2px 0}
.map-legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:middle}
/* istogramma carico terzisti (barre di capacità) */
.loadchart{display:flex;flex-direction:column;gap:11px;margin-top:8px}
.loadrow-h{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:12.5px;margin-bottom:3px}
.loadrow-h b{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loadrow-h .ln{color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
.loadrow-h .st{font-weight:600}
.loadrow-h .st.verde{color:var(--ok)} .loadrow-h .st.giallo{color:var(--warn)} .loadrow-h .st.rosso{color:var(--danger)}
.loadbar{position:relative;height:20px;background:var(--surface-3);border-radius:6px;overflow:hidden;cursor:pointer}
.loadbar .cap{position:absolute;left:0;top:0;bottom:0;background:var(--surface-2)}
.loadbar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px}
.loadbar .fill.verde{background:var(--ok)} .loadbar .fill.giallo{background:var(--warn)} .loadbar .fill.rosso{background:var(--danger);background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.28) 0 3px,transparent 3px 7px)}
.loadbar .capline{position:absolute;top:-1px;bottom:-1px;width:2px;margin-left:-1px;background:var(--ink-soft);z-index:2}
.loadbar:hover .fill{filter:brightness(1.05)}
.load-axis{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums}
.map-legend i.lg{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}
.map-legend i.lg.verde{background:var(--ok)} .map-legend i.lg.giallo{background:var(--warn)} .map-legend i.lg.rosso{background:var(--danger);background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.4) 0 2px,transparent 2px 5px)}

/* ---- Pills / badges ---- */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-soft);white-space:nowrap;font-weight:500}
.pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.dot.auto{background:var(--auto)}.dot.dist{background:var(--dist)}.dot.pot{background:var(--pot)}
.pill.ok{background:var(--ok-tint);color:#256844;border-color:#bfe0cd}
.pill.warn{background:var(--warn-tint);color:#7a5410;border-color:#e6d3a6}
.pill.danger{background:var(--danger-tint);color:#932a20;border-color:#eec4bd}
.pill.info{background:var(--info-tint);color:#1e4f85;border-color:#bcd4ee}
.pill.brand{background:var(--brand-tint);color:var(--brand-deep);border-color:var(--brand-line)}
.pill.accent{background:var(--accent-tint);color:var(--accent-deep);border-color:#f0cfac}
.pill.plain{background:var(--surface);border-color:var(--line)}
.pill.lg{font-size:12.5px;padding:5px 11px}
.tags{display:flex;flex-wrap:wrap;gap:5px}

/* ---- Buttons ---- */
.btn{border:1px solid var(--brand);background:var(--brand);color:#fff;padding:10px 15px;border-radius:10px;min-height:42px;font-size:14px;font-weight:550;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:background .15s,border-color .15s,transform .05s;box-shadow:0 1px 2px rgba(12,90,99,.18)}
.btn:hover{background:var(--brand-deep);border-color:var(--brand-deep)}
.btn:active{transform:translateY(1px)}
.btn.accent{background:var(--accent);border-color:var(--accent)}
.btn.accent:hover{background:var(--accent-deep);border-color:var(--accent-deep)}
.btn.ghost{background:var(--surface);color:var(--ink);border-color:var(--line);box-shadow:none}
.btn.ghost:hover{background:var(--surface-2)}
.btn.danger{background:var(--surface);color:var(--danger);border-color:#e6c2bd;box-shadow:none}
.btn.danger:hover{background:var(--danger-tint)}
.btn.sm{min-height:34px;padding:6px 11px;font-size:13px;border-radius:9px}
.btn.block{width:100%}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;flex-wrap:wrap;gap:8px}

/* ---- Forms ---- */
.field{margin-bottom:13px}
.field > label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.field .hint{font-size:11.5px;color:var(--muted);margin-top:4px}
.inp,select.inp,textarea.inp{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;min-height:44px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.inp:focus,select.inp:focus,textarea.inp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
textarea.inp{min-height:80px;resize:vertical;line-height:1.45}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:999px;padding:8px 13px;font-size:13px;min-height:40px;display:inline-flex;align-items:center;gap:7px;transition:all .12s;font-weight:500}
.chip:hover{border-color:var(--brand-line)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.chip.on .dot{background:#fff}
.chip.on.accent{background:var(--accent);border-color:var(--accent)}
.chip.multi.on{background:var(--brand-tint);border-color:var(--brand-line);color:var(--brand-deep)}
.chip.sugg{border-color:var(--accent);color:var(--accent-deep)}
.chip.multi.on.sugg{background:var(--accent-tint);border-color:var(--accent);color:var(--accent-deep)}
.chip.sm{min-height:34px;padding:6px 11px;font-size:12.5px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--surface)}
.seg button{border:none;background:transparent;padding:8px 13px;font-size:13px;color:var(--ink-soft);min-height:40px;border-right:1px solid var(--line);display:inline-flex;align-items:center;gap:6px}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--brand);color:#fff;font-weight:600}
.switch{width:40px;height:23px;border-radius:12px;background:var(--line);border:none;position:relative;cursor:pointer;flex:0 0 auto;padding:0;transition:background .15s}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch.on{background:var(--brand)}
.switch.on::after{left:19px}
.toggle-row{display:flex;align-items:center;gap:10px;padding:10px 0}
.toggle-row .gr{flex:1}
.toggle-row .gr b{font-size:13.5px}
.toggle-row .gr span{display:block;font-size:12px;color:var(--muted)}

/* ---- Filter bar ---- */
.filters{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:11px;margin-bottom:12px;box-shadow:var(--shadow)}
.searchbox{position:relative;flex:1;min-width:180px}
.searchbox .svg-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
.searchbox input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line);border-radius:9px;min-height:40px;background:#fff}
.searchbox input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
.filt-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filt-adv{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.filt-adv select{padding:7px 10px;border:1px solid var(--line);border-radius:9px;min-height:38px;background:#fff;font-size:13px;color:var(--ink)}
.filt-active{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.fchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 8px;border-radius:8px;background:var(--brand-tint);color:var(--brand-deep);border:1px solid var(--brand-line)}
.fchip button{border:none;background:none;color:inherit;padding:0;display:flex;cursor:pointer}
.result-line{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:2px 2px 10px;font-size:13px;color:var(--muted);flex-wrap:wrap}

/* ---- Table (vista massiva) ---- */
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow)}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px}
table.tbl th{background:var(--surface-2);text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:700;padding:11px 12px;border-bottom:2px solid var(--line);white-space:nowrap}
table.tbl th.sortable{cursor:pointer;user-select:none}
table.tbl th.sortable:hover{color:var(--brand)}
table.tbl th .svg-ic{width:13px;height:13px;opacity:.5;vertical-align:-1px}
table.tbl td{padding:10px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
table.tbl tbody tr{cursor:pointer;transition:background .1s}
table.tbl tbody tr:hover{background:var(--brand-tint)}
table.tbl tbody tr:last-child td{border-bottom:none}
table.tbl .t-title{font-weight:600;color:var(--ink)}
table.tbl .t-sub{font-size:11.5px;color:var(--muted);margin-top:1px}
table.tbl .code{font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap}
table.tbl .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
table.tbl tr.late td{background:linear-gradient(90deg,var(--danger-tint),transparent 30%)}
.morebtn{display:flex;justify-content:center;padding:14px}
/* Lista compatta per la vista massiva su mobile (al posto della tabella larga) */
.jlist{display:flex;flex-direction:column;gap:8px}
.jitem{display:flex;gap:10px;align-items:stretch;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:11px;padding:11px 12px;box-shadow:var(--shadow);text-align:left;width:100%}
.jitem.late{border-left-color:var(--danger)}
.jitem .gr{flex:1;min-width:0}
.jitem .code{font-family:var(--mono);font-size:10.5px;color:var(--muted)}
.jitem .t{font-weight:600;font-size:14px;margin:1px 0 6px;line-height:1.3}
.jitem .meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.jitem .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap}
.jitem .foot .b{color:var(--ink);font-weight:600}
.jitem .arw{align-self:center;color:var(--muted);display:flex}

/* Board */
.board{display:grid;grid-template-columns:repeat(5,minmax(220px,1fr));gap:12px;overflow-x:auto;padding-bottom:8px}
.col{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);padding:10px;display:flex;flex-direction:column;gap:9px;min-width:220px}
.col > .h{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;padding:2px 2px 0}
.col > .h .n{background:#fff;border:1px solid var(--line);border-radius:999px;font-size:11px;padding:1px 8px}

const MESI=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
function monthKey(iso){ return (iso||"").slice(0,7); }
function monthLabel(k){ if(!k) return "—"; const p=k.split("-"); return MESI[(+p[1])-1]+" '"+p[0].slice(2); }
function activeHours(sid){ return STATE.jobs.filter(j=>["assegnato","in_corso"].includes(j.stato)&&j.assegnatoA===sid).reduce((s,j)=>s+(j.oreStimate||0),0); }
function supplierMonthlyLoad(){ const map={}, months=new Set();
  STATE.jobs.filter(j=>["assegnato","in_corso"].includes(j.stato)&&j.assegnatoA).forEach(j=>{ const k=monthKey(j.dataConsegna); map[j.assegnatoA]=map[j.assegnatoA]||{}; map[j.assegnatoA][k]=(map[j.assegnatoA][k]||0)+(j.oreStimate||0); months.add(k); });
  return {map, months:[...months].sort()}; }
// carico e capacità per mese di consegna
function monthLoad(sid, mk){ return STATE.jobs.filter(j=>["assegnato","in_corso"].includes(j.stato)&&j.assegnatoA===sid&&monthKey(j.dataConsegna)===mk).reduce((s,j)=>s+(j.oreStimate||0),0); }
function freeCapacity(sid, mk){ const s=supplier(sid); if(!s) return 0; mk=mk||monthKey(todayISO()); return (s.capacitaMese||0) - monthLoad(sid, mk); }
function loadRatio(sid, mk){ const s=supplier(sid); if(!s||!s.capacitaMese) return 1; mk=mk||monthKey(todayISO()); return monthLoad(sid, mk)/s.capacitaMese; }
function daysBetween(a,b){ if(!a||!b) return null; return Math.round((new Date(b+"T12:00:00")-new Date(a+"T12:00:00"))/86400000); }
// Metriche fornitore (calcolate, non memorizzate) — identiche lato Righi e lato fornitore
function supplierMetrics(sid){
  const jobs=STATE.jobs.filter(j=>j.assegnatoA===sid);
  const delivered=jobs.filter(j=>j.stato==="consegnato"&&j.dataConsegnaEffettiva);
  const onTime=delivered.filter(j=> j.dataConsegnaEffettiva<=j.dataConsegna).length;
  const puntualita=delivered.length? Math.round(onTime/delivered.length*100) : null;
  const lateDel=delivered.filter(j=> j.dataConsegnaEffettiva>j.dataConsegna);
  const ritardoMedio=lateDel.length? Math.round(lateDel.reduce((s,j)=>s+(daysBetween(j.dataConsegna,j.dataConsegnaEffettiva)||0),0)/lateDel.length) : 0;
  const slittamenti=jobs.reduce((s,j)=>s+((j.storicoDate&&j.storicoDate.length)||0),0);
  const perMonth={}; jobs.filter(j=>j.assegnatoAt).forEach(j=>{ const k=monthKey(j.assegnatoAt); perMonth[k]=(perMonth[k]||0)+1; });
  const months=Object.keys(perMonth).sort(); const takenTotal=jobs.filter(j=>j.assegnatoAt).length;
  const perMeseAvg=months.length? takenTotal/months.length : 0;
  const reqs=STATE.requests.filter(r=>r.supplierId===sid); const richiestePerTipo={};
  reqs.forEach(r=>{ richiestePerTipo[r.tipo]=(richiestePerTipo[r.tipo]||0)+1; });
  const invited=STATE.jobs.filter(j=>(j.invitati||[]).includes(sid));
  const acceptedInvited=invited.filter(j=> j.assegnatoA===sid || STATE.responses.some(r=>r.jobId===j.id&&r.supplierId===sid&&r.tipo==="accettazione")).length;
  const tassoAccett=invited.length? Math.round(acceptedInvited/invited.length*100) : null;
  const accs=STATE.responses.filter(r=>r.supplierId===sid&&r.tipo==="accettazione");
  const respTimes=accs.map(a=>{ const j=byId(STATE.jobs,a.jobId); return (j&&j.publishedAt)? daysBetween(j.publishedAt,(a.at||"").slice(0,10)) : null; }).filter(x=>x!=null&&x>=0);
  const tempoRisposta=respTimes.length? Math.round(respTimes.reduce((s,x)=>s+x,0)/respTimes.length*10)/10 : null;
  return { puntualita, ritardoMedio, slittamenti, perMonth, months, takenTotal, perMeseAvg,
    richiestePerTipo, richiesteTot:reqs.length, tassoAccett, tempoRisposta,
    oreAttive:activeHours(sid), commesseAttive:jobs.filter(j=>["assegnato","in_corso"].includes(j.stato)).length, consegnate:delivered.length };
}

/* CSV */
function csvCell(v){ v=(v==null?"":String(v)); return /[";\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function toCSV(rows){ return "﻿"+rows.map(r=>r.map(csvCell).join(";")).join("\r\n"); }
function downloadFile(name, text, mime){ const a=document.createElement("a"); a.href="data:"+(mime||"text/csv")+";charset=utf-8,"+encodeURIComponent(text); a.download=name; a.style.display="none"; document.body.appendChild(a); a.click(); setTimeout(()=>a.remove(),0); }
function parseCSV(text){ text=text.replace(/^﻿/,""); const firstLine=(text.split(/\r?\n/)[0]||""); const delim=(firstLine.split(";").length>=firstLine.split(",").length)?";":","; const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===delim){ row.push(cur); cur=""; } else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=""; } else if(c==='\r'){} else cur+=c; } }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));
}

/* filtro/ordinamento per la vista massiva */
function filteredJobs(){
  const f=App.filters; let a=scopedJobs().slice();
  if(f.stato==="da_assegnare") a=a.filter(j=>j.stato==="pubblicato");
  else if(f.stato==="attivi") a=a.filter(j=>["assegnato","in_corso"].includes(j.stato));
  else if(f.stato) a=a.filter(j=>j.stato===f.stato);
  if(f.late) a=a.filter(isLate);
  if(f.tipologia) a=a.filter(j=>j.tipologia===f.tipologia);
  if(f.settore) a=a.filter(j=>j.settore===f.settore);
  if(f.capo) a=a.filter(j=>j.capoId===f.capo);
  if(f.fornitore) a=a.filter(j=>j.assegnatoA===f.fornitore);
  if(f.q){ const q=f.q.toLowerCase(); a=a.filter(j=>{ const s=supplier(j.assegnatoA); const c=capo(j.capoId);
    return (j.title+" "+j.code+" "+j.settore+" "+TIPOLOGIE[j.tipologia].short+" "+(s?s.name:"")+" "+(c?c.name:"")).toLowerCase().includes(q); }); }
  const k=App.sort.key, dir=App.sort.dir;
  a.sort((x,y)=>{ let vx,vy;
    if(k==="consegna"){vx=x.dataConsegna;vy=y.dataConsegna;}
    else if(k==="budget"){vx=x.budget||0;vy=y.budget||0;}
    else if(k==="ore"){vx=x.oreStimate||0;vy=y.oreStimate||0;}
    else if(k==="code"){vx=x.code;vy=y.code;}
    else if(k==="stato"){vx=x.stato;vy=y.stato;}
    else {vx=x.title;vy=y.title;}
    return vx<vy?-dir:vx>vy?dir:0; });
  return a;
}

// Semaforo salute commessa (predittivo)
function jobHealth(j){
  if(["consegnato","chiuso"].includes(j.stato)) return {level:"done",label:"Consegnato"};
  if(j.stato==="bozza") return {level:"draft",label:"Bozza"};
  if(isLate(j)) return {level:"rosso",label:"In ritardo"};
  const dleft=daysTo(j.dataConsegna);
  if(j.stato==="pubblicato"){ const hasAcc=jobResponses(j.id).some(r=>r.tipo==="accettazione");
    if(dleft!=null&&dleft<10&&!hasAcc) return {level:"rosso",label:"Urgente da assegnare"};
    if(dleft!=null&&dleft<20&&!hasAcc) return {level:"giallo",label:"Da assegnare"};
    return {level:"verde",label:"In tempo"}; }
  const stepIdx=j.avanzamento?AVZ_ORDER.indexOf(j.avanzamento)+1:0;
  const m=j.assegnatoA?supplierMetrics(j.assegnatoA):null; const punt=(m&&m.puntualita!=null)?m.puntualita:85;
  if(dleft!=null){
    if(dleft<7&&stepIdx<3) return {level:"rosso",label:"A rischio ritardo"};
    if(dleft<14&&stepIdx<2) return {level:"giallo",label:"Da monitorare"};
    if(dleft<21&&punt<75&&stepIdx<3) return {level:"giallo",label:"Fornitore poco puntuale"};
  }
  return {level:"verde",label:"In tempo"};
}
function healthDot(j){ const h=jobHealth(j); if(["done","draft"].includes(h.level)) return ""; return `<span class="hdot ${h.level}" title="${h.label}"></span>`; }
// Assegnazione intelligente: punteggio fornitori per una commessa
function suggestSuppliers(job){ const mk=monthKey(job.dataConsegna); const need=job.oreStimate||0;
  const needHv=job.tipologia==="potenza"; const needFood=/food|farmaceutico/i.test(job.settore);
  return STATE.suppliers.filter(s=>s.accredited).map(s=>{ const m=supplierMetrics(s.id); let score=0; const reasons=[];
    if(s.specialties.includes(job.tipologia)){ score+=35; reasons.push("specializzato"); }
    if(s.settori.includes(job.settore)){ score+=20; reasons.push("settore"); }
    if(needHv&&s.certificazioni.includes("hv")){ score+=12; reasons.push(">250A"); }
    if(needFood&&s.certificazioni.includes("food")){ score+=10; reasons.push("igienico"); }
    const free=freeCapacity(s.id,mk);
    if(free>=need){ score+=20; reasons.push("capacità"); } else if(free>0){ score+=8; } else { score-=12; reasons.push("saturo"); }
    if(m.puntualita!=null){ score+=Math.round((m.puntualita-70)/3); if(m.puntualita>=90) reasons.push("puntuale"); } else { score+=3; }
    return {sid:s.id, score, free, need, overload:free<need, reasons, puntualita:m.puntualita };
  }).sort((a,b)=>b.score-a.score);
}
// Proiezione geografica (lat/lng -> x/y su viewBox 100×50) per la mappa SVG offline
function projGeo(lat,lng){ const LAT=[43.95,44.90], LNG=[10.10,12.75];
  const x=7+((lng-LNG[0])/(LNG[1]-LNG[0]))*86; const y=7+(1-(lat-LAT[0])/(LAT[1]-LAT[0]))*36; return {x, y}; }

  const hq=projGeo(RIGHI_HQ.lat,RIGHI_HQ.lng);

  const pins=STATE.suppliers.map(s=>{ const p=projGeo(s.lat,s.lng); const r=loadRatio(s.id); const col=r>1?"#C0392B":r>=0.7?"#B4791A":"#2E7D53"; const used=usedByCapo.has(s.id);

      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="1.9" fill="${col}" stroke="#fff" stroke-width="0.4"/>
      <text x="${p.x.toFixed(1)}" y="${(p.y-2.6).toFixed(1)}" text-anchor="middle" font-size="2.4" fill="#15242B">${esc(s.citta)}</text></g>`; }).join("");
  return `<div class="map-wrap"><svg class="map-svg" viewBox="0 0 100 50" role="img" aria-label="Mappa fornitori Righi">
    <rect x="0" y="0" width="100" height="50" fill="#e9eff2"/>

    <g><rect x="${(hq.x-1.5).toFixed(1)}" y="${(hq.y+2.5).toFixed(1)}" width="3" height="3" transform="rotate(45 ${hq.x.toFixed(1)} ${(hq.y+4).toFixed(1)})" fill="#1E2748"/><text x="${hq.x.toFixed(1)}" y="${(hq.y+8.5).toFixed(1)}" text-anchor="middle" font-size="2.6" font-weight="700" fill="#141B33">Righi HQ</text></g>
    ${pins}

  <div class="map-legend"><span><i style="background:#2E7D53"></i>carico basso</span><span><i style="background:#B4791A"></i>quasi saturo</span><span><i style="background:#C0392B"></i>saturo</span>${capoZone?`<span><i style="background:transparent;border:1.5px solid #1E2748"></i>già usato da te</span>`:""}</div>

// mesi disponibili (dal corrente in avanti) con almeno una consegna, sempre includi corrente..+2
function caricoMesi(){ const cur=monthKey(todayISO()); const set=new Set([cur]);
  const d=new Date(cur+"-01T12:00:00"); for(let i=1;i<=3;i++){ d.setMonth(d.getMonth()+1); set.add(d.toISOString().slice(0,7)); }
  STATE.jobs.filter(j=>["assegnato","in_corso"].includes(j.stato)&&j.assegnatoA&&j.dataConsegna>=cur).forEach(j=>set.add(monthKey(j.dataConsegna)));
  return [...set].sort().slice(0,6);
}
function caricoChartHtml(mk){
  const stateWord={verde:"sotto capacità",giallo:"quasi saturo",rosso:"oltre capacità"};
  const rows=STATE.suppliers.map(s=>{ const load=monthLoad(s.id,mk); const cap=s.capacitaMese||0; const ratio=cap?load/cap:0;
    const commesse=STATE.jobs.filter(j=>["assegnato","in_corso"].includes(j.stato)&&j.assegnatoA===s.id&&monthKey(j.dataConsegna)===mk).length;
    return {s, load, cap, ratio, commesse, state: ratio>1?"rosso":ratio>=0.85?"giallo":"verde"}; }).sort((a,b)=>b.load-a.load);
  const axisMax=Math.max(200, Math.ceil(Math.max(...STATE.suppliers.map(s=>s.capacitaMese||0), ...rows.map(r=>r.load))/200)*200);
  const totLoad=rows.reduce((a,r)=>a+r.load,0), totCap=rows.reduce((a,r)=>a+r.cap,0);
  return `<div class="loadchart">${rows.map(r=>{ const free=r.cap-r.load;
    return `<div class="loadrow">
      <div class="loadrow-h"><b>${esc(r.s.name)}</b><span class="ln">${r.load}/${r.cap} h · ${Math.round(r.ratio*100)}% · <span class="st ${r.state}">${stateWord[r.state]}</span></span></div>
      <div class="loadbar" data-act="supDetail" data-sup="${r.s.id}" title="${esc(r.s.name)} — ${r.load}/${r.cap} h (${Math.round(r.ratio*100)}%) · ${free>=0?free+' h liberi':Math.abs(free)+' h oltre capacità'} · ${r.commesse} commesse nel mese">
        <div class="cap" style="width:${(r.cap/axisMax*100).toFixed(1)}%"></div>
        <div class="fill ${r.state}" style="width:${Math.min(r.load/axisMax*100,100).toFixed(1)}%"></div>
        <div class="capline" style="left:${(r.cap/axisMax*100).toFixed(1)}%"></div></div>
    </div>`;}).join("")}</div>
  <div class="load-axis"><span>0</span><span>${Math.round(axisMax/2)} h</span><span>${axisMax} h</span></div>
  <div class="map-legend"><span><i class="lg verde"></i>sotto capacità</span><span><i class="lg giallo"></i>quasi saturo (≥85%)</span><span><i class="lg rosso"></i>oltre capacità</span><span><span style="display:inline-block;width:2px;height:12px;background:var(--ink-soft);margin-right:5px;vertical-align:middle"></span>capacità mensile</span></div>
  <p class="muted" style="font-size:12px;margin-top:8px">Totale mese: <b>${totLoad} h</b> su ${totCap} h di capacità · tocca una barra per la scheda del fornitore.</p>`;
}

function createJob(mode){

  const job={ id:uid("j"), code:"RGH-"+(n+1), title:d.title, tipologia:d.tipologia, settore:d.settore, carpenteria:d.carpenteria,

    dataConsegnaBase:d.dataConsegna, storicoDate:[], dataConsegnaEffettiva:null, assegnatoAt:null, avanzamento:null };

function importJobsCSV(text){
  const rows=parseCSV(text); if(rows.length<2){ toast("File vuoto o senza righe dati","warn"); return; }
  const head=rows[0].map(h=>slug(h)); const idx=n=>head.indexOf(n);
  const iTit=idx("titolo"),iTip=idx("tipologia"),iSet=idx("settore"),iCar=idx("carpenteria"),iBud=idx("budget"),iOre=idx("ore"),iReq=idx("datarichiesta"),iCon=idx("dataconsegna"),iCap=idx("caposquadra"),iVis=idx("visibilita");
  if(iTit<0){ toast("Manca la colonna 'titolo' — usa il template","warn"); return; }
  const num=v=>v?Number(String(v).replace(/[^\d]/g,"")):null; let n=STATE.jobs.reduce((m,j)=>Math.max(m,parseInt((j.code||"").split("-")[1])||0),2400), added=0;
  for(let r=1;r<rows.length;r++){ const row=rows[r]; const tit=(row[iTit]||"").trim(); if(!tit) continue;
    const tip=["automazione","distribuzione","potenza"].includes(slug(row[iTip]||""))?slug(row[iTip]):"automazione";
    const car=["inclusa","righi","no"].includes((row[iCar]||"").trim())?(row[iCar]||"").trim():"inclusa";
    const cap=STATE.capi.find(c=>slug(c.name)===slug(iCap>=0?row[iCap]:""))||STATE.capi[0];
    const vis=(slug(row[iVis]||"")==="selezionati")?"selezionati":"tutti";
    n++; added++; STATE.jobs.unshift({ id:uid("j"), code:"RGH-"+n, title:tit, tipologia:tip,
      settore:(iSet>=0&&row[iSet])?row[iSet].trim():SETTORI[0], carpenteria:car, budget:num(row[iBud]), oreStimate:num(row[iOre]),
      dataRichiesta:(iReq>=0&&row[iReq])?row[iReq].trim():todayISO(), dataConsegna:(iCon>=0&&row[iCon])?row[iCon].trim():dISO(21),
      capoId:cap.id, descrizione:"", allegati:[], visibility:vis, invitati:[], stato:"bozza", assegnatoA:null, publishedAt:null, createdAt:todayISO(),
      dataConsegnaBase:(iCon>=0&&row[iCon])?row[iCon].trim():dISO(21), storicoDate:[], dataConsegnaEffettiva:null, assegnatoAt:null, avanzamento:null }); }
  persist(); toast(added+" commesse importate in bozza","ok");
  App.tab="lavori"; App.lavoriMode="table"; App.filters={q:"",stato:"bozza",tipologia:"",settore:"",capo:"",fornitore:"",late:false}; App.page=1; render();
}

  STATE.requests.push(req);
  const wantEmail=App.qr.email; persist(); closeModal(); toast(App.qr.tipo==="slittamento"?"Richiesta di slittamento inviata":"Richiesta inviata al caposquadra","ok"); render();
  if(wantEmail && c && c.email){ const body="Buongiorno "+c.name+",\n\nsegnalazione dal Portale Fornitori:\n\nCommessa: "+j.code+" — "+j.title+"\nTipo: "+tp.label+(req.dataProposta?("\nNuova data proposta: "+fmtDate(req.dataProposta)):"")+(note?("\nDettaglio: "+note):"")+"\nFornitore: "+(supplier(u.supplierId)||{}).name+"\n\nGrazie.";
    openEmailModal(c.email, "["+j.code+"] "+tp.label, body); }
}
// Cambio data consegna: registra storico, sovrascrive, notifica il fornitore
function applyDateChange(j, newDate, motivo, byRole, byUser){
  if(!newDate || newDate===j.dataConsegna) return false;
  j.storicoDate=j.storicoDate||[]; j.storicoDate.push({from:j.dataConsegna,to:newDate,by:byUser,byRole,at:new Date().toISOString().slice(0,16),motivo:motivo||"",tipo:byRole==="fornitore"?"slittamento":"modifica"});
  j.dataConsegna=newDate;
  const usr=STATE.users.find(u=>u.supplierId===j.assegnatoA);
  if(usr) STATE.notifications.push({id:uid("n"),toUser:usr.id,ic:"calendar",txt:"Consegna aggiornata: "+fmtDate(newDate),sub:j.code+" — "+j.title,jobId:j.id,at:new Date().toISOString().slice(0,16),read:false});
  return true;
}
function doEditDate(jid){ const j=byId(STATE.jobs,jid); const d=$("#ed-date")?$("#ed-date").value:""; const m=$("#ed-note")?$("#ed-note").value.trim():"";
  if(!d){ toast("Indica la nuova data","warn"); return; } const u=currentUser();
  if(applyDateChange(j, d, m||"Modifica da Righi", isCapo(u)?"caposquadra":"responsabile", u.id)){ persist(); closeModal(); toast("Data consegna aggiornata · fornitore notificato","ok"); render(); }
  else { toast("Nessuna modifica","warn"); }
}
function resolveSlip(rid, approve){ const r=byId(STATE.requests,rid); if(!r) return; const j=byId(STATE.jobs,r.jobId); const u=currentUser();
  r.stato="chiusa"; r.esito=approve?"approvato":"rifiutato"; r.read=true;
  if(approve && j){ applyDateChange(j, r.dataProposta, "Slittamento approvato", "fornitore", r.supplierId); }
  else { const usr=STATE.users.find(x=>x.supplierId===r.supplierId); if(usr) STATE.notifications.push({id:uid("n"),toUser:usr.id,ic:"x",txt:"Slittamento non approvato",sub:(j?j.code+" — "+j.title:""),jobId:r.jobId,at:new Date().toISOString().slice(0,16),read:false}); }
  persist(); closeModal(); toast(approve?"Slittamento approvato · consegna aggiornata":"Slittamento rifiutato","ok"); render();
}
function doNotify(jid){ const j=byId(STATE.jobs,jid); const ids=[...App.notifySel];
  if(!ids.length){ toast("Scegli almeno un fornitore","warn"); return; }
  notifyJob(j, ids); const wantEmail=App.notifyEmail; persist(); closeModal();
  toast("Notifica inviata a "+ids.length+" fornitor"+(ids.length>1?"i":"e"),"ok"); render();
  if(wantEmail) emailJobToSuppliers(j, ids);
}
function doAssign(jid,sid){ const j=byId(STATE.jobs,jid); const s=supplier(sid); j.assegnatoA=sid; j.stato="assegnato"; j.assegnatoAt=todayISO();
  const usr=STATE.users.find(u=>u.supplierId===sid); if(usr) STATE.notifications.push({id:uid("n"),toUser:usr.id,ic:"check",txt:"Commessa assegnata: "+j.title,sub:j.code,jobId:j.id,at:new Date().toISOString().slice(0,16),read:false});
  STATE.responses.filter(r=>r.jobId===jid).forEach(r=>r.read=true);
  persist(); closeModal(); toast("Assegnato a "+s.name,"ok"); render();
}
function setStato(jid,st){ const j=byId(STATE.jobs,jid); j.stato=st; if(st==="consegnato"&&!j.dataConsegnaEffettiva) j.dataConsegnaEffettiva=todayISO(); persist(); closeModal(); toast("Stato aggiornato: "+STATI[st].label,"ok"); render(); }
function setAvanzamento(jid, step){ const u=currentUser(); const j=byId(STATE.jobs,jid); if(!j||!u.supplierId||j.assegnatoA!==u.supplierId) return;
  j.avanzamento=step; j.avanzamentoAt=new Date().toISOString().slice(0,16); j.avanzamentoBy=u.id;
  STATE.responses.push({id:uid("r"),jobId:jid,supplierId:u.supplierId,tipo:"avanzamento",testo:AVANZAMENTO[step].label,at:j.avanzamentoAt,from:"fornitore",read:false});
  persist(); closeModal(); toast("Avanzamento: "+AVANZAMENTO[step].label,"ok"); render();
}
function reqStato(rid,st){ const r=byId(STATE.requests,rid); r.stato=st; r.read=true; persist(); closeModal(); toast(st==="chiusa"?"Richiesta risolta":"Presa in carico","ok"); render(); }

/* aggiorna solo il contenitore risultati (mantiene focus sulla ricerca) */
function updateResults(){ const el=$("#lav-results"); if(!el) return; const u=currentUser();
  if(u.role==="righi"){ el.innerHTML = (App.lavoriMode==="board")?boardHtml():tableHtml(); }
  else if(App.tab==="bacheca"){ let jobs=jobsForSupplier(u.supplierId).filter(j=>j.stato==="pubblicato"&&j.assegnatoA!==u.supplierId&&!jobResponses(j.id).some(r=>r.supplierId===u.supplierId&&r.tipo==="accettazione"));
      const q=(App.fFilters.q||"").toLowerCase(); if(q) jobs=jobs.filter(j=>(j.title+" "+j.code+" "+j.settore).toLowerCase().includes(q));
      el.innerHTML = jobs.length?`<div class="grid auto">${jobs.map(j=>supplierJobCard(j,u)).join("")}</div>`:`<div class="empty">${icon("inbox")}<p>Nessuna proposta</p></div>`; }
  else if(App.tab==="miei"){ render(); }
}

/* ============================ Eventi ============================ */
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-act],[data-login],[data-tab],[data-job],[data-req],[data-set],[data-toggle],[data-qrtype],[data-np],[data-close-bg]");
  if(!el) return;
  if(el.hasAttribute("data-close-bg") && e.target===el){ closeModal(); return; }
  if(el.tagName==="A") return; // lascia procedere i mailto/tel
  if(el.dataset.login){ setSession(el.dataset.login); App.tab=null; App.filters={q:"",stato:"",tipologia:"",settore:"",capo:"",fornitore:"",late:false}; App.fFilters={q:"",stato:""}; closeModal(); render(); return; }
  if(el.dataset.tab && !el.dataset.act){ App.tab=el.dataset.tab; App.page=1; render(); window.scrollTo(0,0); return; }

  if(el.dataset.set){ const g=el.dataset.set; App.draft=App.draft||{}; App.draft[g]=el.dataset.v;
    if(g==="visibility"){ render(); } else { const grp=el.closest(".chips"); if(grp){ $$("[data-set='"+g+"']",grp).forEach(b=>b.classList.remove("on")); } el.classList.add("on"); }
    return; }
  if(el.dataset.toggle==="inv"){ App.draft=App.draft||{invitati:[]}; App.draft.invitati=App.draft.invitati||[];
    const id=el.dataset.v; const i=App.draft.invitati.indexOf(id); if(i<0) App.draft.invitati.push(id); else App.draft.invitati.splice(i,1); el.classList.toggle("on"); return; }
  if(el.dataset.qrtype){ App.qr=App.qr||{}; App.qr.tipo=el.dataset.qrtype; $$("#qr-types .chip").forEach(c=>c.classList.remove("on","accent")); el.classList.add("on","accent"); const b=$("#qr-send"); if(b) b.disabled=false; const slip=$("#qr-slip"); if(slip) slip.classList.toggle("hide", el.dataset.qrtype!=="slittamento"); return; }
  if(el.dataset.np){ const id=el.dataset.np; if(App.notifySel.has(id)) App.notifySel.delete(id); else App.notifySel.add(id); el.classList.toggle("on"); return; }

  if(el.dataset.job && !el.dataset.act){ openJobModal(el.dataset.job); return; }
  if(el.dataset.req && !el.dataset.act){ openReqDetail(el.dataset.req); return; }

  const act=el.dataset.act;
  switch(act){
    case "closeModal": closeModal(); break;
    case "notif": openNotifCenter(); break;
    case "switch": openSwitch(); break;
    case "logout": setSession(null); closeModal(); App.tab=null; render(); break;
    case "goNuovo": App.tab="nuovo"; render(); break;
    case "goTab": App.tab=el.dataset.tab; App.page=1; render(); window.scrollTo(0,0); break;
    case "goFilter": App.tab="lavori"; App.lavoriMode="table"; App.page=1;
      App.filters={q:"",stato:el.dataset.stato==="late"?"":el.dataset.stato,tipologia:"",settore:"",capo:"",fornitore:"",late:el.dataset.stato==="late"}; render(); window.scrollTo(0,0); break;
    case "lavoriMode": App.lavoriMode=el.dataset.m; App.page=1; render(); break;
    case "fornMode": App.fornMode=el.dataset.m; render(); break;
    case "caricoView": App.caricoView=el.dataset.m; render(); break;
    case "caricoMonth": App.caricoMonth=el.dataset.mk; render(); break;
    case "setStatoFilter": App.filters.stato=el.dataset.v; App.page=1; updateResults(); if($("#lav-search"))reflectFilterChips(); render(); break;
    case "toggleLate": App.filters.late=!App.filters.late; App.page=1; render(); break;
    case "clearFilter": App.filters[el.dataset.k]= el.dataset.k==="late"?false:""; App.page=1; render(); break;
    case "clearAll": App.filters={q:"",stato:"",tipologia:"",settore:"",capo:"",fornitore:"",late:false}; App.page=1; render(); break;
    case "sortBy": { const k=el.dataset.k; if(App.sort.key===k) App.sort.dir*=-1; else {App.sort.key=k; App.sort.dir=1;} updateResults(); break; }
    case "more": App.page++; updateResults(); break;
    case "colMore": App.lavoriMode="table"; App.filters.stato=(el.dataset.st==="assegnato")?"":(el.dataset.st==="pubblicato"?"da_assegnare":el.dataset.st); if(el.dataset.st==="assegnato"){App.filters.stato="";} App.page=1; render(); break;
    case "fStato": App.fFilters.stato=el.dataset.v; render(); break;
    case "supJobs": openSupJobs(el.dataset.sup); break;
    case "supDetail": openSupplierModal(el.dataset.sup); break;
    case "publish": doPublish(el.dataset.job); break;
    case "createJob": createJob(el.dataset.mode); break;
    case "toggleDraftEmail": App.draft=App.draft||{}; App.draft.emailNotify=!App.draft.emailNotify; el.classList.toggle("on"); break;
    case "accept": openAcceptModal(el.dataset.job); break;
    case "doAccept": doAccept(el.dataset.job); break;
    case "ask": openAskModal(el.dataset.job); break;
    case "doAsk": doAsk(el.dataset.job); break;
    case "quickReq": openQuickReq(el.dataset.job); break;
    case "toggleQrEmail": App.qr=App.qr||{}; App.qr.email=!App.qr.email; el.classList.toggle("on"); break;
    case "doQuickReq": doQuickReq(el.dataset.job); break;
    case "notifyPick": openNotifyPick(el.dataset.job); break;
    case "toggleNotifyEmail": App.notifyEmail=!App.notifyEmail; el.classList.toggle("on"); break;
    case "doNotify": doNotify(el.dataset.job); break;
    case "assignPick": openAssignPick(el.dataset.job); break;
    case "assign": doAssign(el.dataset.job, el.dataset.sup); break;
    case "setStato": setStato(el.dataset.job, el.dataset.s); break;
    case "setAvz": setAvanzamento(el.dataset.job, el.dataset.step); break;
    case "reqStato": reqStato(el.dataset.id, el.dataset.s); break;
    case "quickReply": sendQuickReply(el.dataset.id, el.dataset.txt); break;
    case "openReqFoto": openReqFoto(el.dataset.id); break;
    case "reqDetail": openReqDetail(el.dataset.id); break;
    case "approveSlip": resolveSlip(el.dataset.id, true); break;
    case "rejectSlip": resolveSlip(el.dataset.id, false); break;
    case "editDate": openEditDate(el.dataset.job); break;
    case "doEditDate": doEditDate(el.dataset.job); break;
    case "rmAtt": App.draft.allegati=(App.draft.allegati||[]).filter(a=>a.id!==el.dataset.id); render(); break;
    case "openAtt": openAttachment(el.dataset.job, el.dataset.att); break;
    case "guide": openGuide(); break;
    case "emailSup": { const s=supplier(el.dataset.sup); if(s) openEmailModal(s.email,"Righi Solutions — Portale Fornitori","Buongiorno "+s.referente+",\n\n"); break; }
    case "emailJobSup": { const j=byId(STATE.jobs,el.dataset.job); const s=j&&supplier(j.assegnatoA); if(s) openEmailModal(s.email,"["+j.code+"] "+j.title,"Buongiorno "+s.referente+",\n\nin merito alla commessa "+j.code+" — "+j.title+".\n\n"); break; }
    case "emailReq": { const rq=byId(STATE.requests,el.dataset.id); const j=rq&&byId(STATE.jobs,rq.jobId); const s=rq&&supplier(rq.supplierId); if(s) openEmailModal(s.email,"["+(j?j.code:"")+"] "+REQ_TYPES[rq.tipo].label,"Buongiorno "+s.referente+",\n\nin merito alla sua segnalazione ("+REQ_TYPES[rq.tipo].label+") sulla commessa "+(j?j.code:"")+".\n\n"); break; }
    case "openEmailClient": { const em=App._email||{}; const bd=($("#em-body")||{}).value||em.body||""; const a=document.createElement("a"); a.href=mailto(em.to,em.subject,bd); a.target="_blank"; a.rel="noopener"; a.style.display="none"; document.body.appendChild(a); a.click(); setTimeout(()=>a.remove(),0); break; }
    case "copyEmail": { const em=App._email||{}; const bd=($("#em-body")||{}).value||em.body||""; const txt="A: "+em.to+"\nOggetto: "+em.subject+"\n\n"+bd; if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(()=>toast("Email copiata negli appunti","ok"),()=>toast("Copia non riuscita","warn")); else toast("Copia non supportata su questo dispositivo","warn"); break; }
    case "exportOrders": exportOrders(); break;
    case "dlTemplate": dlTemplate(); break;
  }
});
function reflectFilterChips(){ /* no-op: la ricerca aggiorna via updateResults, i chip via render */ }

// ricerca istantanea (senza perdere il focus)
document.addEventListener("input",e=>{
  if(e.target && e.target.id==="lav-search"){ App.filters.q=e.target.value; App.page=1; updateResults(); }
  if(e.target && e.target.id==="forn-search"){ App.fFilters.q=e.target.value; updateResults(); }
});
// select filtri avanzati
document.addEventListener("change",e=>{
  if(e.target && e.target.dataset && e.target.dataset.adv){ App.filters[e.target.dataset.adv]=e.target.value; App.page=1; render(); return; }
  if(e.target && e.target.id==="nl-import"){ const f=e.target.files[0]; if(!f) return;
    if(/\.(xlsx|xls)$/i.test(f.name)){ toast("Salva il file Excel come CSV, poi ricaricalo","warn"); e.target.value=""; return; }
    const rd=new FileReader(); rd.onload=()=>importJobsCSV(String(rd.result)); rd.onerror=()=>toast("Lettura file non riuscita","warn"); rd.readAsText(f); e.target.value=""; return; }
  if(e.target && e.target.id==="qr-foto"){ const f=e.target.files[0]; if(!f) return; App.qr=App.qr||{};
    const rd=new FileReader(); rd.onload=()=>{ App.qr.foto=rd.result; const p=$("#qr-foto-prev"); if(p) p.innerHTML=`<div class="attach"><span class="fi">${icon("doc")}</span><span class="gr"><b>Foto allegata</b><span>tocca "Invia" per inoltrarla</span></span><img src="${rd.result}" style="width:46px;height:46px;object-fit:cover;border-radius:8px"></div>`; }; rd.readAsDataURL(f); e.target.value=""; return; }
  if(e.target && e.target.id==="nl-file"){
    App.draft=App.draft||{allegati:[]}; App.draft.allegati=App.draft.allegati||[];
    const files=[...e.target.files]; let pend=files.length;
    files.forEach((f,idx)=>{
      const isLayout=(App.draft.allegati.length===0 && idx===0) || /layout/i.test(f.name);
      const a={id:uid("a"),name:f.name,type:f.type||f.name.split(".").pop(),size:(f.size>1024?Math.round(f.size/1024)+" KB":f.size+" B"),layout:isLayout};
      if(f.size<600000 && /image|pdf/.test(f.type)){ const rd=new FileReader(); rd.onload=()=>{ a.dataUrl=rd.result; App.draft.allegati.push(a); if(--pend===0) render(); }; rd.readAsDataURL(f); }
      else { App.draft.allegati.push(a); if(--pend===0) render(); }
    });
  }
});

/* ri-render al cambio di breakpoint mobile/desktop (tabella <-> schede) */
let _narrow = isNarrow(), _rzt=null;
window.addEventListener("resize",()=>{ clearTimeout(_rzt); _rzt=setTimeout(()=>{ const n=isNarrow(); if(n!==_narrow){ _narrow=n; if(currentUser()) render(); } },200); });

/* ============================ Boot ============================ */
render();
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
